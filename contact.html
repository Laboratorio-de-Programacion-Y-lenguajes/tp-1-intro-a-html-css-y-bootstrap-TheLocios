<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-primary sticky-top">
        <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Mi Blog</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">Acerca de mí</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="contact.html">Contacto</a>
                </li>
            </ul>
            </div>
        </div>
    </nav>

    <!-- Formulario de contacto -->
    <main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Contacto</h2>
            
            <form action="#" method="POST">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono (Opcional)</label>
                    <input type="tel" class="form-control" id="telefono" name="telefono">
                </div>

                <div class="mb-3">
                    <label for="mensaje" class="form-label">Mensaje</label>
                    <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required minlength="10"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Enviar mensaje</button>
            </form>
            
        </div>
    </div>
</main>

    <footer class="bg-dark text-white py-4 mt-auto">
            <div class="container text-center">
            <p class="mb-2">&copy; 2026 Eliam Vargas. Todos los derechos reservados.</p>
            <div>
            <a href="https://github.com/TheLocios" target="_blank" class="text-white text-decoration-none mx-2">GitHub</a>
            <a href="https://www.instagram.com/eliamjvds/" target="_blank" class="text-white text-decoration-none mx-2">Instagram</a>
            </div>
            </div>
        </footer>

    <!-- Script: validación HTML5 + feedback visual -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
